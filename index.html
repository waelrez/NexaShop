<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexaShop</title>
<link rel="stylesheet" href="style.css">
</head>
<body> 

<header>
<h1>NexaShop</h1>
<div onclick="openCart()">🛒</div>
</header>

<div class="products" id="products"></div>

<!-- CART -->
<div id="cartBox" class="cart">
<h2>Cart</h2>
<div id="cartItems"></div>

<h3>Checkout</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<select id="payment">
<option>Cash</option>
<option>Card</option>
</select>

<button onclick="checkout()">Confirm</button>
</div>

<script src="script.js"></script>
</body>
</html>

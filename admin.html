<!DOCTYPE html>
<html>
<body style="background:black;color:white">

<h1>Orders</h1>
<div id="orders"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")||"[]");

orders.forEach(o=>{
document.getElementById("orders").innerHTML += `
<div>
<p>${o.name}</p>
<p>${o.phone}</p>
<p>${o.payment}</p>
<p>${o.cart.map(i=>i.name)}</p>
</div>
`;
});
</script>

</body>
</html>
